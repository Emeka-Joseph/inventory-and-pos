{% extends 'base.html' %}
{% block title %}Warehouse Login — {{ business.name }}{% endblock %}
{% block body %}
<div class="min-vh-100 bg-light d-flex align-items-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-10 col-md-6 col-lg-5">
        <div class="text-center mb-4">
          <a href="/" class="text-decoration-none">
            <i class="fa-solid fa-cubes fa-2x text-dark"></i>
          </a>
          <h4 class="fw-bold mt-2">{{ business.name }}</h4>
          <p class="text-muted small">Warehouse Keeper Login</p>
        </div>
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <form method="POST">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
              <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                  <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus/>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                  <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
                </div>
              </div>
              <button type="submit" class="btn btn-dark w-100 fw-semibold">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
              </button>
            </form>
          </div>
        </div>
        <div class="text-center mt-3">
          <a href="/" class="small text-muted"><i class="fa-solid fa-arrow-left me-1"></i>Back to home</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
