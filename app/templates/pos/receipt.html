<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Receipt {{ sale.sale_number }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      font-weight: 700;
      font-size: 14px;
      color: #000;
      width: {{ '72mm' if business.paper_width_mm == 80 else '50mm' }};
      margin: 0 auto;
      padding: 2mm;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .center { text-align: center; }
    .divider { border-top: 2px solid #000; margin: 8px 0; }
    .row { display: flex; justify-content: space-between; margin: 3px 0; }
    .bold { font-weight: 700; }
    .big { font-size: 16px; }
    @media print {
      .no-print { display: none; }
    }
  </style>
</head>
<body>
  <div id="receiptContent">
  {% include 'pos/_receipt_body.html' %}
  </div>

  <div class="no-print" style="margin-top:1rem; text-align:center">
    <button onclick="window.print()" style="padding:8px 20px;background:#198754;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px">
      Print Receipt
    </button>
    <button onclick="window.close()" style="padding:8px 20px;margin-left:8px;background:#6c757d;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px">
      Close
    </button>
  </div>
  <script>
    window.onload = function() {
      // Size the printed page to exactly fit the receipt content (no @page "auto" — that lets the
      // printer driver's default fixed page length take over, which is what causes a blank gap
      // followed by the tail of the receipt on a "second page" of the same continuous roll).
      const heightMm = Math.ceil(document.getElementById('receiptContent').scrollHeight * 25.4 / 96) + 4;
      const style = document.createElement('style');
      style.textContent = `@page { size: {{ '72mm' if business.paper_width_mm == 80 else '50mm' }} ${heightMm}mm; margin: 0; }`;
      document.head.appendChild(style);
      window.print();
    };
  </script>
</body>
</html>
