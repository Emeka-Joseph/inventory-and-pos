{% extends 'base.html' %}
{% block title %}Find Your Business — Eventry POS{% endblock %}
{% block body %}
<div class="min-vh-100 bg-light d-flex align-items-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-10 col-md-6 col-lg-4">
        <div class="text-center mb-4">
          <i class="fa-solid fa-store fa-3x text-dark mb-2"></i>
          <h4 class="fw-bold">Eventry POS</h4>
          <p class="text-muted">Enter your business URL to log in</p>
        </div>
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <p class="text-muted small">Your login URL format is:<br>
              <code>http://localhost:5000/<strong>your-business-slug</strong>/login</code>
            </p>
            <hr/>
            <p class="small">Don't have an account?</p>
            <a href="/register" class="btn btn-success w-100">Register Your Business</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
