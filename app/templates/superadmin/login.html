{% extends 'base.html' %}
{% block title %}Super Admin Login — Eventry POS{% endblock %}
{% block body %}
<div class="min-vh-100 d-flex align-items-center justify-content-center"
     style="background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);">
  <div class="card border-0 shadow-lg" style="width:380px;border-radius:16px;overflow:hidden;">
    <div class="card-header text-center py-4" style="background:#1a1a2e;">
      <i class="fa-solid fa-shield-halved fa-2x text-warning mb-2"></i>
      <div class="text-white fw-bold fs-5">Super Admin</div>
      <div class="text-white-50 small">Eventry POS Platform Management</div>
    </div>
    <div class="card-body p-4">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
            <input type="text" name="username" class="form-control" autofocus required/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold small">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
            <input type="password" name="password" class="form-control" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-warning w-100 fw-bold">
          <i class="fa-solid fa-right-to-bracket me-1"></i>Sign In
        </button>
      </form>
    </div>
    <div class="card-footer text-center py-2 bg-light">
      <a href="/" class="small text-muted"><i class="fa-solid fa-arrow-left me-1"></i>Back to site</a>
    </div>
  </div>
</div>
{% endblock %}
