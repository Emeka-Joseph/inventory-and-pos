<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Receipt {{ sale.sale_number }}</title>

  <!-- Needed only for print-agent-based printing (rasterizes #receiptContent client-side). -->
  <script src="{{ url_for('static', filename='js/html2canvas.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/print-client.js') }}"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      font-weight: 700;
      font-size: 14px;
      color: #000;
      width: {{ '72mm' if business.paper_width_mm == 80 else '50mm' }};
      margin: 0 auto;
      padding: 2mm;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .center { text-align: center; }
    .divider { border-top: 2px solid #000; margin: 8px 0; }
    .row { display: flex; justify-content: space-between; margin: 3px 0; }
    .bold { font-weight: 700; }
    .big { font-size: 16px; }
    @media print {
      .no-print { display: none; }
    }
  </style>
</head>
<body>
  <div id="receiptContent">
  {% include 'pos/_receipt_body.html' %}
  </div>

  <div class="no-print" style="margin-top:1rem; text-align:center">
    <button onclick="printNow()" style="padding:8px 20px;background:#198754;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px">
      Print Receipt
    </button>
    <button onclick="window.close()" style="padding:8px 20px;margin-left:8px;background:#6c757d;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px">
      Close
    </button>
  </div>

  <script>
    function printNow() {
      // Primary path: hand the receipt to the local print agent (see /print-agent),
      // which prints it as a raw ESC/POS raster image -- no page/pagination
      // concept involved, so no blank-gap bug regardless of printer driver.
      // Returns the underlying promise so callers can act once printing is done.
      return ReceiptPrinter.printReceipt({
        elementId: 'receiptContent',
        paperWidthMm: {{ business.paper_width_mm }},
        onFallback: function (reason) {
          if (reason !== 'agent-unavailable') return;

          // Emergency fallback only, for tills that haven't installed the print
          // agent yet: size the printed page to the actual content height so
          // window.print() has the best chance of not leaving a gap. Still
          // subject to the driver-level pagination quirk this whole project
          // exists to get away from -- installing the agent is the real fix.
          var contentEl = document.getElementById('receiptContent');
          var heightMm = Math.ceil(contentEl.scrollHeight * 25.4 / 96) + 4;
          var style = document.createElement('style');
          style.textContent = '@page { size: {{ "72mm" if business.paper_width_mm == 80 else "50mm" }} ' + heightMm + 'mm; margin: 0; }';
          document.head.appendChild(style);
        }
      });
    }

    window.onload = function () {
      // Auto-print on load (this is the checkout flow's tab), then close it --
      // the sales rep never asked to see a preview, so don't leave one lingering
      // for them to dismiss by hand. The manual "Print Receipt" button below
      // (e.g. reprinting from Sale Details) intentionally does NOT auto-close.
      printNow().then(function () {
        window.close();
      });
    };
  </script>
</body>
</html>
