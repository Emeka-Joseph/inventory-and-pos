{% extends 'base.html' %}
{% block title %}Register — Eventry POS{% endblock %}
{% block body %}
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/"><i class="fa-solid fa-store me-2"></i>Eventry POS</a>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <!-- Progress steps -->
      <div class="d-flex align-items-center justify-content-center gap-2 mb-4">
        <div class="d-flex align-items-center gap-1">
          <span class="badge rounded-pill bg-success px-3 py-2">1</span>
          <span class="small fw-semibold">Verify Email</span>
        </div>
        <div class="flex-grow-1 border-top border-2 mx-2" style="max-width:40px"></div>
        <div class="d-flex align-items-center gap-1">
          <span class="badge rounded-pill bg-secondary px-3 py-2">2</span>
          <span class="small text-muted">Enter Code</span>
        </div>
        <div class="flex-grow-1 border-top border-2 mx-2" style="max-width:40px"></div>
        <div class="d-flex align-items-center gap-1">
          <span class="badge rounded-pill bg-secondary px-3 py-2">3</span>
          <span class="small text-muted">Complete Setup</span>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h4 class="fw-bold mb-1">Get Started</h4>
          <p class="text-muted mb-4 small">Enter your business email. We'll send a verification code.</p>

          <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="mb-3">
              <label class="form-label fw-semibold">Business Email <span class="text-danger">*</span></label>
              <div class="input-group input-group-lg">
                <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                <input type="email" name="email" class="form-control"
                       placeholder="business@example.com" required autofocus/>
              </div>
            </div>
            <button type="submit" class="btn btn-success btn-lg w-100 fw-semibold">
              <i class="fa-solid fa-paper-plane me-2"></i>Send Verification Code
            </button>
          </form>
        </div>
      </div>
      <div class="text-center mt-3">
        <a href="/" class="small text-muted"><i class="fa-solid fa-arrow-left me-1"></i>Back to home</a>
      </div>

    </div>
  </div>
</div>
{% endblock %}
